name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*' # se dispara al hacer push con tag

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write      # permiso necesario para publicar en GitHub Packages

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@keber'

      - run: npm publish --access public

